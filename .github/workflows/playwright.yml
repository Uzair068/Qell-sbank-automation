name: Guru99 Bank — Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Banking E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Banking E2E Tests
        run: npx playwright test tests/banking.spec.ts
        env:
          BASE_URL: https://demo.guru99.com/V4
          MANAGER_ID: ${{ secrets.MANAGER_ID }}
          MANAGER_PASSWORD: ${{ secrets.MANAGER_PASSWORD }}
          CI: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: banking-test-report
          path: playwright-report/
          retention-days: 30